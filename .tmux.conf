##### ------------------------------------------------------------
##### tmux.conf — clean script-based status bar
##### ------------------------------------------------------------

##### Terminal / behavior
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 100000
set -g allow-rename off
set -g set-titles on
set -g set-titles-string "#S:#I.#P #W"

##### Prefix / reload
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

##### Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Swap panes
bind -r \{ swap-pane -U
bind -r \} swap-pane -D

##### Misc pane/window actions
bind y setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"
bind z resize-pane -Z
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind Tab last-window
bind -r S-Left swap-window -t -1
bind -r S-Right swap-window -t +1

##### Copy mode (vi)
setw -g mode-keys vi
bind Enter copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel

##### Session shortcuts
bind C-f command-prompt -p "find-window:" "find-window '%%'"
bind C-s choose-session
bind w choose-window
bind s choose-tree -Zs

##### Appearance
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 200
set -g status-interval 1

##### Color-blind-friendly palette
set -g status-style "bg=#1a1a1a,fg=#e6e6e6"
set -g message-style "bg=#ffffff,fg=#000000"
set -g message-command-style "bg=#ffffff,fg=#000000"
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#56b4e9"

setw -g window-status-style "fg=#d0d0d0,bg=#444444"
setw -g window-status-current-style "bold,fg=#ffffff,bg=#005f87"
setw -g window-status-activity-style "bold,fg=#ffffff,bg=#5f5f00"
setw -g window-status-bell-style "bold,fg=#ffffff,bg=#5f5f00"

setw -g window-status-format " #[fg=#d0d0d0,bg=#444444] #I:#W#{?window_flags,#{window_flags}, } "
setw -g window-status-current-format " #[bold,fg=#ffffff,bg=#005f87] #I:#W#{?window_flags,#{window_flags}, } "

##### Left side
set -g status-left "#[bold,fg=#ffffff,bg=#005f87] #S #[default]"

##### Right side
set -g status-right "#[bold,fg=#ffffff,bg=#005f87] CPU #(~/.tmux/scripts/cpu.sh) #[default] \
#[bold,fg=#ffffff,bg=#5f5f00] MEM #(~/.tmux/scripts/mem.sh) #[default] \
#(~/.tmux/scripts/battery.sh) \
#[bold,fg=#ffffff,bg=#444444] UP #(~/.tmux/scripts/uptime.sh) #[default] \
#[bold,fg=#ffffff,bg=#444444] LOAD #(~/.tmux/scripts/load.sh) #[default] \
#[bold,fg=#ffffff,bg=#5f5f00] NET #(~/.tmux/scripts/net.sh) #[default] \
#[bold,fg=#ffffff,bg=#444444] %Y-%m-%d #[default] \
#[bold,fg=#ffffff,bg=#005f87] %H:%M:%S "

##### Optional quality-of-life
set -g visual-activity off
set -g visual-bell off
set -g bell-action none
bind C-l send-keys 'C-l' \; run-shell 'sleep 0.05' \; clear-history
